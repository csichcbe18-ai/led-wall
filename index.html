<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Church LED Display - Celebration Showcase</title>
    <style>
        /* Base configuration derived from your working LED wall template */
        body, html { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            background-color: black; 
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif; 
        }
        #bg { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background-size: cover; 
            background-position: center; 
            transition: background-image 0.8s ease-in-out; 
        }
        .overlay { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: radial-gradient(circle, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.75) 100%); 
            z-index: 5; 
        }
        .container { 
            position: relative; 
            z-index: 10; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100%; 
            padding: 20px; 
            text-align: center; 
            box-sizing: border-box;
        }

        /* Fixed Premium Glassmorphic Container */
        .ui-card {
            background: rgba(255, 255, 255, 0.08);
            -webkit-backdrop-filter: blur(14px);
            backdrop-filter: blur(14px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 35px 40px;
            border-radius: 24px;
            max-width: 90%;
            width: 580px;
            box-sizing: border-box;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        
        /* Modern Premium Dynamic Heading Badge */
        #heading-line {
            display: inline-block;
            font-size: 40px;
            color: #ffd700; 
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 28px;
            background: rgba(255, 215, 0, 0.15);
            padding: 6px 20px;
            border-radius: 50px;
            border: 1px solid rgba(255, 215, 0, 0.35);
        }

        /* High-Performance Readable Typography Layers */
        #names-line { 
            font-size: 36px; 
            font-weight: 900; 
            color: #ffffff;
            text-shadow: 0 4px 12px rgba(0,0,0,0.7);
            line-height: 1.4; 
            margin-bottom: 16px; 
        }
        #milestone-line { 
            font-size: 22px; 
            color: rgba(255, 255, 255, 0.95);
            font-weight: 600; 
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            margin-bottom: 18px;
        }
        #date-line {
            font-size: 25px;
            color: #ff66fa; 
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        #date-line .day-number {
            font-size: 42px;
            font-weight: 900;
            display: inline-block;
            margin-right: 4px;
            color: #ffffff;
        }
        
        .watermark { 
            position: absolute; 
            bottom: 20px; 
            left: 30px; 
            font-size: 14px; 
            font-weight: 800; 
            color: rgba(255, 255, 255, 0.35); 
            z-index: 20; 
            letter-spacing: 3px; 
            text-transform: uppercase;
        }
    </style>
</head>

        let currentIndex = 0;

        function formatDateBig(dateStr, label) {
            if (!dateStr) return "";
            const match = dateStr.match(/^(\d+)(.*)$/);
            if (match) {
                return `${label}: <span class="day-number">${match[1]}</span>${match[2]}`;
            }
            return `${label}: ${dateStr}`;
        }

        function refreshContent() {
            try {
                if (!rawData || rawData.length === 0) return;
                
                const item = rawData[currentIndex];
                const currentYear = new Date().getFullYear();
                
                let headingText = "";
                let names = "";
                let milestoneText = "";
                let dateHTML = "";

                if (item.husband && item.wife) {
                    let hName = item.husband.replace(/^(Mr|Mrs|Ms)\.?\s+/i, '');
                    let wName = item.wife.replace(/^(Mr|Mrs|Ms)\.?\s+/i, '');
                    
                    let parsedYear = parseInt(item.year);
                    if (isNaN(parsedYear)) parsedYear = currentYear;
                    const milestone = currentYear - parsedYear;

                    headingText = "Wedding Wish";
                    names = `Mr. ${hName}<br>& Mrs. ${wName}`;
                    milestoneText = `Celebrating ${milestone} Years of Marriage`;
                    dateHTML = formatDateBig(item.date, "Wedding Day");
                    document.getElementById('bg').style.backgroundImage = bgImages.wedding;
                } 
                else if (item.name) {
                    headingText = "Birthday Wish";
                    names = item.name;
                    milestoneText = "Celebrating Joyful Birthday";
                    dateHTML = formatDateBig(item.date, "Birthday");
                    document.getElementById('bg').style.backgroundImage = bgImages.birthday;
                }

                document.getElementById('heading-line').innerText = headingText;
                document.getElementById('names-line').innerHTML = names;
                document.getElementById('milestone-line').innerText = milestoneText;
                document.getElementById('date-line').innerHTML = dateHTML;

            } catch (error) {
                console.error("Error at index: " + currentIndex, error);
            } finally {
                currentIndex = (currentIndex + 1) % rawData.length;
            }
        }

        refreshContent();
        setInterval(refreshContent, slideDuration);
